<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="todolist.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Nexus Tasks</title>
</head>
<body>

    <div class="todo-wrapper">
        <div class="todo-card">
            <div class="card-header">
                <h2>NEXUS // FLOW<span class="pulse-dot"></span></h2>
                <p class="subtitle">PREMIUM TASK MANAGER</p>
            </div>
            
            <div class="input-group">
                <div class="input-wrapper">
                    <i class="fa-solid fa-terminal input-icon"></i>
                    <input type="text" id="taskInput" placeholder="Add a new task assignment...">
                </div>
                <button class="add-btn" onclick="addTask()">
                    <span>ADD TASK</span>
                </button>
            </div>
            
            <ul id="taskList"></ul>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3><i class="fa-solid fa-sliders"></i> Edit Task</h3>
            <input type="text" id="editTaskInput">
            <div class="modal-actions">
                <button class="cancel-btn" onclick="closeEditModal()">Cancel</button>
                <button class="save-btn" onclick="saveEditedTask()">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="todolist.js"></script>
</body>
</html>
