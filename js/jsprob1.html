<body>
    <script>
     function calculateBonus(salary, exp) {
  let bonusRate;

  if (exp > 5) {
    bonusRate = 0.10; // 10%
  } else {
    bonusRate = 0.05; // 5%
  }

  const finalSalary = salary + (salary * bonusRate);
  
  return `Final Salary: ${finalSalary}`;
}

// Example usage:
console.log(calculateBonus(50000, 6)); // Output: Final Salary: 55000
console.log(calculateBonus(50000, 3)); // Output: Final Salary: 52500
    </script>
    
</body>
</html>
