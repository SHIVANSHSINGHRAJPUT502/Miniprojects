            //  SPREAD OPERATOR

               // REST OPERATOR


               const getAverage = (...marks) => {
    const total = marks.reduce((sum, mark) => sum + mark, 0);
         return total / marks.length;
                              };

             console.log(getAverage(80, 90, 70)); // Output: 80
              console.log(getAverage(10, 20));     // Output: 15


// Difference: const b = [...a] vs const b = a
            //    const b = a (Reference):

              const a = [1, 2];
          const b = a;
           b.push(3);
           console.log(a); // Output: [1, 2, 3] (a changed because they share the same reference!)
        
        // const b = [...a] (Shallow Copy):

        const a = [1, 2];
         const b = [...a];
          b.push(3);
        console.log(a); // Output: [1, 2] (a remains unchanged)
           console.log(b); // Output: [1, 2, 3]
