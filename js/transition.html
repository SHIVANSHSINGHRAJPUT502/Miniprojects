<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyframe Animation Example</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 30px;
            background-color: #f0f0f0;
            margin: 0;
        }

        button {
            padding: 15px 30px;
            background-color: red;
            font-size: 20px;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.5s ease; 
        }

        button:hover {
            background-color: blue;
            animation: pulse 1.5s infinite alternate;
        }

        .circle {        
            width: 100px;
            height: 100px;
            background-color: green;
            border-radius: 50%; 
            animation: bounceAndTransform 2s ease-in-out infinite;
        }

        .ball {
            width: 50px;
            height: 50px;
            background-color: purple;
            border-radius: 50%;
            /* FIXED: Removed spaces from the animation name */
            animation: Bounce 0.5s ease-in-out infinite alternate;
        }

        
        @keyframes Bounce {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(30px);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(0, 0, 255, 0.4);
            }
            100% {
                transform: scale(1.1);
                box-shadow: 0 0 20px 10px rgba(0, 0, 255, 0);
            }
        }

        @keyframes bounceAndTransform {
            0%, 100% {
                transform: translateY(0);
                background-color: green;
            }
            50% {
                transform: translateY(-40px); 
                background-color: orange;    
                border-radius: 20%;          
            }
        }
    </style>
</head>

<body>
    <button>HOLD ME</button>
    <div class="circle"></div>
    <div class="ball"></div>
</body>
</html>
