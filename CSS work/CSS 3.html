<!-- flexboxlayout -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Layout Challenges</title>
    <style>
        
       * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background-color: #f7f9fa;
            color: #333;
            padding: 40px 20px;
        }

        h2 {
            margin: 40px 0 15px 0;
            font-size: 20px;
            color: #4a5568;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
        }

        /* Generic styling for our layout containers */
        .container {
            background-color: blue;
            border: 2px dashed pink;
            border-radius: 8px;
            padding: 20px;
            min-height: 150px;
        }

        /* look for the boxes inside the layouts */
        .box {
            background-color: #1010e4; 
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 18px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }


        /*  3 boxes in a row with equal spacing
            */
        .layout-one {
            display: flex;
            justify-content: space-between; 
            align-items: center;
        }

        .layout-one .box {
            width: 30%; 
            height: 100px;
        }


        /*  box centered horizontally + vertically */
        .layout-two {
            display: flex;
            justify-content: center; 
            align-items: center;
        }

        .layout-two .box {
            width: 120px;
            height: 120px;
            background-color: #ef4444; /* Red for distinction */
        }


        /* 
           6 boxes in a row on desktop, wrapping on small screens */
        .layout-three {
            display: flex;
            flex-wrap: wrap; 
            gap: 15px; 
        }

        .layout-three .box {
            background-color: green;
            height: 80px;
            flex: 1 1 calc(16.66% - 15px); 
            min-width: 120px; 
        }
    </style>
</head>
<body>

    <h2>Scenario 1: 3 Boxes in a row with equal spacing</h2>
    <div class="container layout-one">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>

    <h2>Scenario 2: 1 Box perfectly centered (Horizontal + Vertical)</h2>
    <div class="container layout-two">
        <div class="box">Center</div>
    </div>

    <h2>Scenario 3: 6 Boxes in a row (Wraps automatically on smaller screens)</h2>
    <div class="container layout-three">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
    </div>

</body>
</html>
