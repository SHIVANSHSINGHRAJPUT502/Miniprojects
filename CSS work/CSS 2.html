<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Components Demo</title>

<style> 
    /* Global Reset & Page Base */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #f8fafc; /* Subtle slate off-white */
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #1e293b;
        padding: 40px 20px;
        min-height: 100vh;
    }

    h1 {
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: -0.025em;
        margin-bottom: 40px;
        color: #0f172a;
    }

    /* Clean Card Layout for Sections */
    .section {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 24px;
        width: 100%;
        max-width: 440px;
        margin-bottom: 24px;
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        text-align: left; /* Human UIs typically align form elements to the left */
    }

    .section h4 {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #64748b;
        margin-bottom: 16px;
        font-weight: 600;
    }
    
    /* 1. Button Layout & Hover Style */
    .custom-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background-color: #4f46e5; /* Modern Indigo */
        color: #ffffff;
        font-size: 0.95rem;
        font-weight: 500;
        padding: 12px 24px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
        transition: background-color 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .custom-button:hover {
        background-color: #4338ca; /* Deep indigo on hover */
    }

    /* 2. Text Input & Focus Highlighting */
    .input-group {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .checkbox-container {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.95rem;
        cursor: pointer;
    }

    .custom-text-input {
        width: 100%;
        padding: 10px 14px;
        font-size: 0.95rem;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        outline: none;
        background-color: #ffffff;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    /* Modern subtle focus shadow instead of flat color inversion */
    .custom-text-input:focus {
        border-color: #4f46e5;
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15); 
    }

    /* 3. Visited / Unvisited Link Styling */
    .link-wrapper {
        text-align: center;
    }

    .custom-link:link {
        color: #2563eb; /* Classic clean blue */
        text-decoration: none;
        font-weight: 500;
        font-size: 0.95rem;
        transition: color 0.15s ease;
    }

    .custom-link:visited {
        color: #7c3aed; /* Human UI purple for history tracking */
    }

    .custom-link:hover {
        text-decoration: underline;
        color: #1d4ed8;
    }

    /* 4. List Structure & First/Last Item Pseudo-classes */
    .custom-list {
        list-style-type: none;
    }

    .custom-list li {
        padding: 12px 16px;
        background-color: #f8fafc;
        border-left: 3px solid #cbd5e1;
        margin-bottom: 8px;
        font-size: 0.95rem;
        color: #334155;
    }

    .custom-list li:last-child {
        margin-bottom: 0; /* Cleans up structural trailing space */
    }

    /* Pseudo-class Accent */
    .custom-list li:first-child {
        border-left-color: #22c55e; /* Green accent mark for first */
        background-color: #f0fdf4;
        font-weight: 600;
        color: #166534;
    }

    .custom-list li:last-child {
        border-left-color: #3b82f6; /* Blue accent mark for last */
        background-color: #eff6ff;
        font-weight: 600;
        color: #1e40af;
    }
</style>

</head>
<body>

    <h1>Interactive Interface Elements</h1>

    <div class="section">
        <h4>Button (:hover)</h4>
        <button class="custom-button">Action Button</button>
    </div>
    
    <div class="section">
        <h4>Form Inputs (:focus)</h4>
        <div class="input-group">
            <label class="checkbox-container">
                <input type="checkbox" id="checkbox1">
                <span>Enable feature flag</span>
            </label>
            <input type="text" class="custom-text-input" placeholder="Enter username...">
        </div>
    </div>

    <div class="section">
        <h4>Priority Queue (:first-child / :last-child)</h4>
        <ul class="custom-list">
            <li>Top Priority Item</li>
            <li>Standard System Task</li>
            <li>Standard System Task</li>
            <li>Low Priority Archive</li>
        </ul>
    </div>

    <div class="section link-wrapper">   
        <h4>Navigation (:link / :visited)</h4>
        <a href="https://studynexus-psi.vercel.app" target="_blank" class="custom-link">Return to StudyNexus Dashboard</a>
    </div>

</body>
</html>
