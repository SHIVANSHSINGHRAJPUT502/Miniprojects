<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Craving Fast? | Gourmet Pizza Delivery</title>
  
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: #fdfdfd;
      color: #2d3436;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 25px 8%;
      background-color: #ffffff;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 800;
      color: #e67e22;
      letter-spacing: -0.5px;
    }

    .logo span {
      color: #d35400;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 35px;
    }

    .nav-links a {
      text-decoration: none;
      color: #636e72;
      font-weight: 600;
      font-size: 0.95rem;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: #d35400;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 50px 6%;
      gap: 40px;
      min-height: calc(100vh - 90px);
      text-align: center;
    }

    .hero-text {
      width: 100%;
      max-width: 600px;
    }

    .hero-text h1 {
      font-size: 2.6rem;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 18px;
      color: #2c3e50;
      letter-spacing: -1px;
    }

    .hero-text p {
      font-size: 1.1rem;
      color: #7f8c8d;
      line-height: 1.6;
      margin-bottom: 35px;
    }

    .btn-order {
      background-color: #d35400;
      color: #ffffff;
      border: none;
      padding: 16px 36px;
      font-size: 1.05rem;
      font-weight: 700;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 8px 15px rgba(211, 84, 0, 0.2);
      transition: all 0.2s ease;
    }

    .btn-order:hover {
      background-color: #e67e22;
      transform: translateY(-2px);
      box-shadow: 0 12px 20px rgba(211, 84, 0, 0.3);
    }

    .hero-image-container {
      width: 100%;
      max-width: 500px;
      position: relative;
      display: flex;
      justify-content: center;
    }

    .hero-image-container img {
      width: 100%;
      height: auto;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
    }

    .discount-badge {
      position: absolute;
      top: -15px;
      right: -10px;
      background-color: #f1c40f;
      color: #2c3e50;
      padding: 10px 20px;
      font-weight: 800;
      font-size: 0.9rem;
      border-radius: 50px;
      box-shadow: 0 6px 15px rgba(241, 196, 15, 0.4);
      letter-spacing: 0.5px;
    }

    @media (max-width: 999px) {
      .nav-links {
        display: none;
      }
    }

    @media (min-width: 1000px) {
      .hero {
        flex-direction: row;
        text-align: left;
        padding: 0 8%;
        gap: 80px;
      }

      .hero-text {
        flex: 1;
        max-width: none;
      }

      .hero-text h1 {
        font-size: 4rem;
        margin-bottom: 24px;
      }

      .hero-text p {
        font-size: 1.25rem;
        margin-bottom: 40px;
      }

      .hero-image-container {
        flex: 1;
        max-width: 550px;
      }

      .discount-badge {
        top: 30px;
        right: -20px;
      }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="logo">Pizza<span>Burst</span></div>
    <nav>
      <ul class="nav-links">
        <li><a href="#">Menu</a></li>
        <li><a href="#">Offers</a></li>
        <li><a href="#">Track Order</a></li>
      </ul>
    </nav>
  </header>

  <main class="hero">
    
    <div class="hero-text">
      <h1>Hot, Fresh &<br>Delivered To Your Door</h1>
      <p>Experience the authentic taste of hand-tossed sourdough pizzas, loaded with premium toppings and baked to blistered perfection.</p>
      <button class="btn-order">Claim Your Crust</button>
    </div>

    <div class="hero-image-container">
      <img src="https://images.unsplash.com/photo-1593560708920-61dd98c46a4e?q=80&w=600" alt="Gourmet Woodfired Pizza">
      <div class="discount-badge">50% OFF WEEKEND</div>
    </div>

  </main>

</body>
</html>
